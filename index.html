<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global EcoSort AI - Kimi Vision Edition</title>
    <style>
        :root { --accent: #00ff88; --bg: #0f172a; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 12px; background: rgba(0,0,0,0.8); display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; z-index: 100; }
        select { padding: 12px; border-radius: 10px; background: #1e293b; color: white; border: 1px solid #334155; font-size: 14px; outline: none; -webkit-appearance: none; }
        
        .search-container { padding: 10px 15px; background: #1e293b; display: flex; gap: 8px; z-index: 100; border-bottom: 1px solid #334155; }
        #searchInput { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); background: #0f172a; color: white; font-size: 14px; outline: none; transition: 0.3s; }
        #searchInput:focus { box-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .search-btn { background: var(--accent); color: #000; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .search-btn:active { transform: scale(0.95); }

        .viewfinder { flex: 1; position: relative; background: #000; }
        video, #previewImg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 15px var(--accent); display: none; z-index: 5; animation: scan 2s linear infinite; }
        @keyframes scan { from { top: 0% } to { top: 100% } }
        
        .controls { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #1e293b; }
        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #scanBtn { background: var(--accent); color: #000; grid-column: span 2; }
        .btn-sec { background: #334155; color: white; }
        
        #resCard { position: absolute; bottom: 100px; left: 20px; right: 20px; padding: 20px; border-radius: 20px; display: none; z-index: 50; animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid transparent; transition: all 0.3s ease;}
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #statusBadge { display: inline-block; padding: 6px 12px; border-radius: 8px; font-weight: 900; font-size: 13px; margin-bottom: 12px; letter-spacing: 1px; }
        .badge-hazard { background: #fff; color: #d32f2f; border: 2px solid #d32f2f; box-shadow: 0 0 15px rgba(211, 47, 47, 0.6); animation: hazardPulse 1.5s infinite alternate; }
        .badge-recycle { background: rgba(255,255,255,0.25); border: 1px solid #fff; color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        @keyframes hazardPulse { from { box-shadow: 0 0 10px #d32f2f; } to { box-shadow: 0 0 25px #d32f2f, inset 0 0 10px rgba(211,47,47,0.3); } }

        #praiseText { font-size: 14px; opacity: 0.9; margin-bottom: 5px; font-weight: bold; }
        #itemName { font-size: 28px; font-weight: 900; margin-bottom: 5px; }
        #binInfo { font-size: 20px; font-weight: bold; margin-bottom: 10px; background: rgba(255,255,255,0.2); display: inline-block; padding: 6px 14px; border-radius: 10px; }
        #lawBox { font-size: 13px; line-height: 1.5; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; border-left: 4px solid #fff; }
        .hazard-law { border-left: 4px solid #ffeb3b !important; font-weight: bold; }
    </style>
</head>

        "KP": { plastic: { bin: {zh:"物资回收", en:"Recycle"}, color:"#27ae60", icon:"♻️", law: {zh:"国家号召集中回收物资。", en:"State recycling."}}, trash: { bin: {zh:"生活垃圾", en:"Trash"}, color:"#7f8c8d", icon:"🗑️", law: {zh:"生活垃圾集中处理。", en:"General waste."}} },
        "PK": { plastic: { bin: {zh:"可回收", en:"Recycle"}, color:"#2980b9", icon:"♻️", law: {zh:"交由回收商处理。", en:"Local recyclers."}}, trash: { bin: {zh:"垃圾", en:"Waste"}, color:"#333", icon:"🗑️", law: {zh:"填埋或堆肥。", en:"General waste."}} },
        "DEFAULT": { plastic: { bin: {zh:"可回收", en:"Recycle"}, color:"#2980b9", icon:"♻️", law: {zh:"通用规则：塑料通常可回收。", en:"Generally recyclable."}}, trash: { bin: {zh:"一般垃圾", en:"Waste"}, color:"#333", icon:"🗑️", law: {zh:"无法回收的残余物。", en:"Residual waste."}} }
    };

    function handleSearch() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!query) return;
        let foundLabel = "trash";
        for (let label in ITEM_NAMES) {
            const item = ITEM_NAMES[label];
            const matchKeywords = [...(item.key || []), item.zh, item.en, item.jp].map(k => k?.toLowerCase());
            if (matchKeywords.some(k => k && query.includes(k))) {
                foundLabel = label;
                break;
            }
        }
        renderResult(foundLabel, true);
    }

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });

    async function initCam() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const v = document.getElementById('video');
            v.srcObject = stream;
            v.style.display = "block";
            document.getElementById('previewImg').style.display = "none";
        } catch(e) { console.log("相机开启失败"); }
    }

    function toggleCam() { initCam(); }

    function handleFile(input) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('previewImg');
                img.src = e.target.result;
                img.style.display = "block";
                document.getElementById('video').style.display = "none";
                if(stream) stream.getTracks().forEach(t => t.stop());
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateUI() {
        const l = document.getElementById('langBox').value;
        document.getElementById('btnText').innerText = LANG_UI[l].scan;
        document.getElementById('searchInput').placeholder = LANG_UI[l].searchTip || "Search...";
    }

    // ==========================================
    // 核心修改：使用 Kimi 视觉模型进行识别
    // ==========================================
    async function runAI() {
        const btn = document.getElementById('scanBtn');
        const line = document.getElementById('line');
        const card = document.getElementById('resCard');
        btn.disabled = true;
        line.style.display = "block";
        card.style.display = "none";
        document.getElementById('lawBox').className = "";
        document.getElementById('lawBox').innerText = "Kimi AI 正在深度分析画面...";

        try {
            let base64Image;
            
            // 将视频帧或图片转换为 Base64，这是大模型需要的格式
            if(document.getElementById('video').style.display !== "none") {
                const canvas = document.createElement('canvas');
                const v = document.getElementById('video');
                canvas.width = v.videoWidth; 
                canvas.height = v.videoHeight;
                canvas.getContext('2d').drawImage(v, 0, 0);
                base64Image = canvas.toDataURL('image/jpeg');
            } else {
                const img = document.getElementById('previewImg');
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth || img.width; 
                canvas.height = img.naturalHeight || img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                base64Image = canvas.toDataURL('image/jpeg');
            }

            if(!base64Image || base64Image === "data:,") throw new Error("请先拍照或选图");

            // 发起请求到 Kimi
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${KIMI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "moonshot-v1-8k-vision-preview", // Kimi 的视觉模型
                    messages: [
                        {
                            role: "user",
                            content: [
                                { 
                                    type: "text", 
                                    text: "你是一个垃圾分类助手。请识别图中的物品，并仅从以下关键词中选择一个最合适的返回，绝不要输出任何多余的解释、标点或文字：hazardous, plastic, paper, glass, metal, cardboard, trash。" 
                                },
                                { 
                                    type: "image_url", 
                                    image_url: { url: base64Image } 
                                }
                            ]
                        }
                    ],
                    temperature: 0.1 // 降低温度，让 AI 的回答更稳定、直接
                })
            });

            const data = await response.json();
            
            // 处理 Kimi 接口报错（比如你刚才遇到的额度限制）
            if(data.error) {
                if (data.error.message.includes("rate_limit") || data.error.message.includes("100 requests")) {
                    throw new Error("今日免费额度(100次)已用完，请明天再试或充值。");
                }
                throw new Error(data.error.message);
            }

            // 清理 AI 的回复，确保能够触发下方的规则库
            let resultLabel = data.choices[0].message.content.toLowerCase().trim();
            // 过滤掉可能存在的标点符号
            resultLabel = resultLabel.replace(/[^a-z]/g, ''); 
            
            // 如果 AI 回答了不在列表里的词，容错归类为 trash
            if (!ITEM_NAMES[resultLabel]) {
                resultLabel = "trash";
            }

            renderResult(resultLabel, false);

        } catch(e) { 
            card.style.display = "block";
            card.style.background = "#8b0000";
            document.getElementById('itemName').innerText = "识别中断";
            document.getElementById('lawBox').innerText = e.message;
        } finally {
            btn.disabled = false;
            line.style.display = "none";
        }
    }

    function renderResult(label, isSearch = false) {
        const l = document.getElementById('langBox').value;
        const r = document.getElementById('regionBox').value;
        const card = document.getElementById('resCard');
        const badge = document.getElementById('statusBadge');
        const lawBox = document.getElementById('lawBox');
        
        let mat = label;
        if (label === "cardboard") mat = "paper";
        if (label === "metal") mat = "plastic";

        const ruleSet = RULES[r] || RULES["DEFAULT"];
        let rule = ruleSet[mat] || ruleSet["trash"] || RULES["DEFAULT"].trash;

        if (label === "hazardous") {
            rule = {
                color: "#d32f2f", 
                icon: "☢️", 
                bin: { zh: "红色有害桶 / 专门回收点", en: "Red Bin / Hazardous Drop-off" }, 
                law: { zh: "⚠️ 严重警告：包含有毒或重金属成分，严禁混入普通垃圾！随意丢弃面临高额罚款，请投至专门回收站。", en: "⚠️ WARNING: Toxic/Hazardous! Strictly prohibited from general waste." }
            };
            badge.className = "badge-hazard";
            badge.innerText = "☣️ 高危废弃物 HAZARDOUS";
            badge.style.display = "inline-block";
            lawBox.className = "hazard-law";
            card.style.border = "2px solid #ff5252";
        } else {
            lawBox.className = "";
            card.style.border = "2px solid transparent";
            if (rule.color === "#2980b9" || rule.color === "#f1c40f" || rule.color === "#27ae60" || rule.color === "#e67e22") {
                badge.className = "badge-recycle";
                badge.innerText = "♻️ 可回收资源 RECYCLABLE";
                badge.style.display = "inline-block";
            } else {
                badge.style.display = "none";
            }
        }

        card.style.display = "block"; 
        card.style.background = rule.color;
        const praises = PRAISE_POOL[l] || PRAISE_POOL["en"];
        document.getElementById('praiseText').innerText = isSearch ? "🔍 检索结果" : "✨ " + praises[Math.floor(Math.random()*praises.length)];
        document.getElementById('regionTag').innerText = `🌍 ${r} - ${LANG_UI[l].tag}`;
        const nameObj = ITEM_NAMES[label] || { en: label };
        document.getElementById('itemName').innerText = (nameObj[l] || nameObj.en).toUpperCase();
        document.getElementById('binInfo').innerText = `${rule.icon} ${rule.bin[l] || rule.bin.en || "BIN"}`;
        lawBox.innerText = rule.law[l] || rule.law.zh || rule.law.en || "";
    }

    initCam();
    updateUI();
</script>
</body>
</html>
